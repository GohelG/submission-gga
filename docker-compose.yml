# Create docker compose file for the application
services:
  user-service:
    build:
      context: ./user-service
      dockerfile: Dockerfile
    container_name: user-service
    expose:
      - "3000"
    environment:
      - PORT=3000
      - NODE_ENV=production
    networks:
      - app-tier
    restart: always

  product-service:
    build:
      context: ./product-service
      dockerfile: Dockerfile
    container_name: product-service
    expose:
      - "3001"
    environment:
      - PORT=3001
      - NODE_ENV=production
    networks:
      - app-tier
    restart: always

  order-service:
    build:
      context: ./order-service
      dockerfile: Dockerfile
    container_name: order-service
    expose:
      - "3002"
    environment:
      - PORT=3002
      - NODE_ENV=production
    networks:
      - app-tier
    restart: always  

  gateway-service:
    build:
      context: ./gateway-service
      dockerfile: Dockerfile
    container_name: gateway-service
    ports:
      - "3003:3003"
    environment:
      - PORT=3003
      - NODE_ENV=production
      - USER_SERVICE_URL=http://localhost:3000
      - PRODUCT_SERVICE_URL=http://localhost:3001
      - ORDER_SERVICE_URL=http://localhost:3002
    depends_on:
      - user-service
      - product-service
      - order-service
    networks:
      - app-tier
    restart: always

networks:
  app-tier:
    driver: bridge